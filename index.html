<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAREEM CARDS | الواجهة الرئيسية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        :root {
            --gold: #f1c40f;
            --gold-hover: #f39c12;
            --bg-dark: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
        }

        /* خلفية سينمائية مع أنيميشن خفيف */
        .main-wrapper {
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at center, #1e272e 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* أيقونة الموقع الشخصي - فوق يمين */
        .portfolio-icon {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(241, 196, 15, 0.1);
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(241, 196, 15, 0.2);
            z-index: 100;
        }

        .portfolio-icon:hover {
            transform: rotate(360deg) scale(1.1);
            background: var(--gold);
            box-shadow: 0 0 30px var(--gold);
        }

        .portfolio-icon svg {
            width: 30px;
            height: 30px;
            fill: var(--gold);
            transition: 0.4s;
        }

        .portfolio-icon:hover svg {
            fill: black;
        }

        /* شعار اللعبة الرئيسي */
        .logo-container {
            text-align: center;
            margin-bottom: 50px;
            animation: pulse 3s infinite ease-in-out;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #fff 30%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(241, 196, 15, 0.4));
        }

        .subtitle {
            color: #888;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 1rem;
            margin-top: -10px;
        }

        /* حاوية الأزرار المركزية */
        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 350px;
            z-index: 10;
        }

        .menu-btn {
            position: relative;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            color: var(--gold);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(241, 196, 15, 0.3);
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        /* خطوط الديكور الجانبية لكل زر */
        .menu-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--gold);
            transform: scaleY(0);
            transition: 0.3s;
        }

        .menu-btn:hover::before {
            transform: scaleY(1);
        }

        .menu-btn:hover {
            background: rgba(241, 196, 15, 0.1);
            transform: translateX(10px);
            border-color: var(--gold);
            box-shadow: -10px 0 20px rgba(241, 196, 15, 0.1);
        }

        /* زر "العب الآن" بستايل مختلف */
        .btn-primary {
            background: var(--gold);
            color: black;
            border: none;
        }

        .btn-primary:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        /* تفاصيل إضافية للزوايا (Frame) */
        .corner {
            position: absolute;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(241, 196, 15, 0.2);
            pointer-events: none;
        }
        .top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
        }

        /* تحسينات المودال (نافذة الألعاب) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            width: 80%;
            max-width: 800px;
            border: 1px solid var(--gold);
            padding: 40px;
            border-radius: 10px;
            position: relative;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .game-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            border: 1px solid transparent;
        }

        .game-card:hover {
            background: #222;
            border-color: var(--gold);
            transform: translateY(-5px);
        }

        .game-card img {
            width: 50px;
            height: 70px;
            border-radius: 4px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--gold);
            font-size: 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="corner top-left"></div>
        <div class="corner bottom-right"></div>

        <a href="https://kemo-omar.github.io/Kareem/" target="_blank" class="portfolio-icon" title="موقعي الشخصي">
            <svg viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z"/></svg>
        </a>

        <div class="logo-container">
            <h1>KAREEM</h1>
            <div class="subtitle">Card Gaming Platform</div>
        </div>

        <div class="menu-options">
            <button class="menu-btn btn-primary" onclick="openModal()">🎮 ابدأ اللعب</button>
            <a href="عرض.html" class="menu-btn">🃏 معرض الكروت</a>
            <div style="text-align: center; margin-top: 20px; color: #444; font-size: 0.8rem;">V 1.0.0 PREMIUM EDITION</div>
        </div>
    </div>

    <div id="gamesModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--gold); text-align: center; font-size: 2rem;">اختر التحدي</h2>
            
            <div class="game-grid">
                <a href="old-maid.html" class="game-card">
                    <img src="K_BLACK_SPADES.PNG" alt="Ace">
                    <div>
                        <strong style="display: block; color: var(--gold);">الشايب</strong>
                        <small>لا تترك الشايب في يدك!</small>
                    </div>
                </a>
                
                <a href="basra.html" class="game-card">
                    <img src="7_RED_DIAMONDS.PNG" alt="Jack">
                    <div>
                        <strong style="display: block; color: var(--gold);">بصرة</strong>
                        <small>السرعة والذكاء المصري.</small>
                    </div>
                </a>

                <a href="i-doubt-it.html" class="game-card">
                    <img src="A_RED_HEARTS.PNG" alt="King">
                    <div>
                        <strong style="display: block; color: var(--gold);">أشك</strong>
                        <small>فن الخداع والمراوغة.</small>
                    </div>
                </a>
                
                <a href="Conti-Conti.html" class="game-card">
                    <img src="9_BLACK_CLUBS.PNG" alt="King">
                    <div>
                        <strong style="display: block; color: var(--gold);">كونتي كونتي</strong>
                        <small>اتنين ضد اتنين</small>
                    </div>
                </a>

                <a href="top.html" class="game-card">
                    <img src="J_BLACK_SPADES.PNG" alt="King">
                    <div>
                        <strong style="display: block; color: var(--gold);">فوق بعضيه</strong>
                        <small>حط و ال شبه بعضه بيكسب</small>
                    </div>
                </a>

                <a href="bank.html" class="game-card">
                    <img src="10_BLACK_SPADES.PNG" alt="10">
                    <div>
                        <strong style="display: block; color: var(--gold);">البنك</strong>
                        <small>اجمع النقاط واهزم البنك.</small>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById("gamesModal");

        function openModal() {
            modal.style.display = "flex";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
